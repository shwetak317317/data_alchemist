services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: datatrust_meta
      POSTGRES_USER: datatrust
      POSTGRES_PASSWORD: datatrust_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datatrust -d datatrust_meta"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://datatrust:datatrust_pass@postgres:5432/datatrust_meta
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./DataTrust.html:/usr/share/nginx/html/index.html:ro
      - ./app:/usr/share/nginx/html/app:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pg_data:
