<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DataTrust — Agentic Data Quality Platform</title>
<link rel="stylesheet" href="app/tokens.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--grey-400); background-clip: padding-box; }
  ::-webkit-scrollbar-track { background: transparent; }
  button { font-family: var(--font-ui); }
  @keyframes dtSlideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes dtFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes dtPop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes dtFadeUp { from { transform: translateY(10px); } to { transform: translateY(0); } }
  @keyframes dtPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
  @keyframes dtSpin { to { transform: rotate(360deg); } }
  @keyframes dtFlow { to { stroke-dashoffset: -16; } }
  @keyframes dtFlash { 0% { background: var(--red-100); } 100% { background: #fff; } }
  .dt-fade-up { animation: dtFadeUp 360ms cubic-bezier(0.2,0,0,1) both; }
  .dt-spin { animation: dtSpin 800ms linear infinite; }
  .dt-pulse { animation: dtPulse 1.4s ease-in-out infinite; }
  .dt-row-hover:hover { background: var(--grey-50) !important; }
</style>
</head>
<body>
<div id="root" style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--fg-2);font-family:var(--font-ui)">Loading DataTrust…</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>window.DTScreens = window.DTScreens || {};</script>
<script src="app/data.js"></script>
<!-- API client — exposes window.DTApi for all backend calls -->
<script type="module">
  import * as API from './app/api.js';
  window.DTApi = API;
</script>
<script type="text/babel" src="app/primitives.jsx"></script>
<script type="text/babel" src="app/auth.jsx"></script>
<script type="text/babel" src="app/screens_connections.jsx"></script>
<script type="text/babel" src="app/screens_home.jsx"></script>
<script type="text/babel" src="app/screens_profiling.jsx"></script>
<script type="text/babel" src="app/screens_metadata.jsx"></script>
<script type="text/babel" src="app/screens_rules.jsx"></script>
<script type="text/babel" src="app/screens_execution.jsx"></script>
<script type="text/babel" src="app/screens_anomalies.jsx"></script>
<script type="text/babel" src="app/screens_impact.jsx"></script>
<script type="text/babel" src="app/screens_dashboard.jsx"></script>
<script type="text/babel" src="app/screens_intel.jsx"></script>
<script type="text/babel" src="app/screens_simulator.jsx"></script>
<script type="text/babel" src="app/shell.jsx"></script>
<script type="text/babel">
  (function mount() {
    if (!window.DTApp) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById("root")).render(<window.DTApp />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
  })();
</script>
</body>
</html>
