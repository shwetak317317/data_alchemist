server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No-build-step SPA: the browser transpiles app/*.jsx via Babel at load time,
    # so a cached script IS a stale app — every frontend fix silently fails to
    # reach users until they hard-refresh ("feature X not working" reports that
    # reproduce on nobody else's machine). Force revalidation on every load;
    # files are tiny and ETag/304 keeps the cost negligible.
    location ~ ^/(app/|DataTrust\.html$|index\.html$) {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Proxy API calls to FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Required for SSE (Server-Sent Events) streaming
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }
}
